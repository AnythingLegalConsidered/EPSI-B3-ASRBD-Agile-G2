# ConfigMap containing the frontend HTML page
# Mounted into nginx container at /usr/share/nginx/html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: prod
  labels:
    app: frontend
    tier: frontend
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>NTL Platform</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
          background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
          color: #e2e8f0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .container {
          text-align: center;
          padding: 3rem;
          background: rgba(255, 255, 255, 0.05);
          border-radius: 16px;
          border: 1px solid rgba(255, 255, 255, 0.1);
          backdrop-filter: blur(10px);
          max-width: 600px;
          width: 90%;
        }
        h1 {
          font-size: 2.5rem;
          margin-bottom: 0.5rem;
          background: linear-gradient(90deg, #38bdf8, #818cf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .subtitle {
          font-size: 1.2rem;
          color: #94a3b8;
          margin-bottom: 2rem;
        }
        .status {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.5rem 1rem;
          background: rgba(34, 197, 94, 0.1);
          border: 1px solid rgba(34, 197, 94, 0.3);
          border-radius: 8px;
          color: #4ade80;
          font-size: 0.9rem;
          margin-bottom: 1.5rem;
        }
        .status::before {
          content: '';
          width: 8px;
          height: 8px;
          background: #4ade80;
          border-radius: 50%;
          animation: pulse 2s infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }
        .info {
          font-size: 0.85rem;
          color: #64748b;
          margin-top: 1.5rem;
        }
        .info span {
          color: #94a3b8;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>NTL Platform</h1>
        <p class="subtitle">React Frontend</p>
        <div class="status">Application running</div>
        <p class="info">
          Deployed on <span>K3s Cluster</span> &mdash;
          Backend API at <span>/api</span>
        </p>
      </div>
    </body>
    </html>
