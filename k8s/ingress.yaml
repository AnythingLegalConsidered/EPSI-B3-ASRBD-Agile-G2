# Ingress rules for Traefik (K3s default ingress controller)
# Routes / to frontend, /api to backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ntl-ingress
  namespace: prod
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: k8s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
