# ============================================================
# Kubernetes Dashboard - Monitoring Setup
# ============================================================
#
# Step 1: Deploy the Kubernetes Dashboard
#
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml
#
# Step 2: Apply this file to create the admin user and role binding
#
#   kubectl apply -f dashboard.yaml
#
# Step 3: Get the login token
#
#   kubectl -n kubernetes-dashboard create token admin-user
#
# Step 4: Access the dashboard
#
#   kubectl proxy
#   Then open: http://localhost:8001/api/v1/namespaces/kubernetes-dashboard/services/https:kubernetes-dashboard:/proxy/
#
# Alternative: NodePort access (for lab environment)
#
#   kubectl -n kubernetes-dashboard patch svc kubernetes-dashboard \
#     -p '{"spec": {"type": "NodePort", "ports": [{"port": 443, "targetPort": 8443, "nodePort": 30443}]}}'
#
#   Then open: https://192.168.10.100:30443
#
# ============================================================

# ServiceAccount for dashboard admin access
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: kubernetes-dashboard

# ClusterRoleBinding to grant admin privileges
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: admin-user
    namespace: kubernetes-dashboard
