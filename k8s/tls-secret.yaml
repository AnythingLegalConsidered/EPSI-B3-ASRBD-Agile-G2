# ============================================================
# TLS Secret Template for k8s.local
# ============================================================
#
# This file documents how to create a self-signed TLS certificate
# and the corresponding Kubernetes secret for HTTPS access.
#
# Step 1: Generate a self-signed certificate
#
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key \
#     -out tls.crt \
#     -subj "/CN=k8s.local/O=NTL-Platform"
#
# Step 2: Create the Kubernetes TLS secret
#
#   kubectl create secret tls tls-secret \
#     --cert=tls.crt \
#     --key=tls.key \
#     -n prod
#
# Step 3: Verify the secret was created
#
#   kubectl get secret tls-secret -n prod
#   kubectl describe secret tls-secret -n prod
#
# ============================================================
# Alternatively, you can apply this manifest after replacing
# the base64-encoded cert and key values:
# ============================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: prod
type: kubernetes.io/tls
data:
  # Replace with your base64-encoded TLS certificate
  # cat tls.crt | base64 -w 0
  tls.crt: "<BASE64_ENCODED_CERTIFICATE>"
  # Replace with your base64-encoded TLS private key
  # cat tls.key | base64 -w 0
  tls.key: "<BASE64_ENCODED_PRIVATE_KEY>"
